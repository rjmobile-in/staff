<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RJ Mobile | Secure Terminal</title>
  <script>if (localStorage.getItem('rj_theme') === 'light') { document.documentElement.classList.add('light-theme'); }</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base: #09090b; --card-bg: #18181b; --card-bg-alpha: rgba(24, 24, 27, 0.75); --card-border: #27272a;
      --primary: #3b82f6; --primary-hover: #60a5fa; --primary-alpha: rgba(59, 130, 246, 0.15);
      --text-main: #f4f4f5; --text-soft: #a1a1aa; --success: #10b981; --success-alpha: rgba(16, 185, 129, 0.15);
      --danger: #ef4444; --danger-alpha: rgba(239, 68, 68, 0.15); --input-bg: #09090b; --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.4);
    }
    html.light-theme {
      --bg-base: #f8fafc; --card-bg: #ffffff; --card-bg-alpha: rgba(255, 255, 255, 0.85); --card-border: #e2e8f0;
      --primary: #4f46e5; --text-main: #0f172a; --text-soft: #64748b; --input-bg: #f1f5f9;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg-base); color: var(--text-main); font-size: 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; overflow-x: hidden; }
    .glass-effect { background: var(--card-bg-alpha); backdrop-filter: blur(16px); border: 1px solid var(--card-border); }
    #global-loader { position: fixed; inset: 0; background: rgba(var(--bg-base), 0.9); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    .spinner { width: 48px; height: 48px; border: 4px solid var(--card-border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    #login-screen { display: none; background: var(--card-bg); padding: 48px 40px; border-radius: 24px; box-shadow: var(--shadow-soft); text-align: center; width: 100%; max-width: 420px; margin-top: 12vh; border: 1px solid var(--card-border); }
    .input-field { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--card-border); background: var(--input-bg); color: var(--text-main); margin-bottom: 16px; outline: none; font-size: 16px; font-weight: 600; cursor: pointer; }
    .input-field:focus { border-color: var(--primary); }
    #login-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--primary); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    #login-btn:hover { transform: translateY(-2px); }
    #error-msg { color: var(--danger); font-size: 14px; margin-top: 16px; display: none; background: var(--danger-alpha); padding: 10px; border-radius: 10px; }

    #dashboard { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 500px; }
    .header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 24px; padding: 16px 24px; border-radius: 20px; }
    .btn-secondary { background: transparent; border: 1px solid var(--card-border); color: var(--text-main); padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 600; }
    .main-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 24px; padding: 32px; width: 100%; }
    
    #video-container { position: relative; background: #000; border-radius: 16px; overflow: hidden; width: 100%; height: 380px; margin-bottom: 20px; }
    #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #flash-overlay { position: absolute; inset: 0; background: white; opacity: 0; transition: opacity 0.1s; pointer-events: none; }
    #flash-overlay.flash { opacity: 0.8; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 10px; }
    .btn-action { padding: 16px; border-radius: 14px; border: none; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-in { background: var(--success); } .btn-out { background: var(--danger); }
    .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

    #toast { visibility: hidden; position: fixed; bottom: 40px; left: 50%; transform: translate(-50%, 20px); font-size: 15px; font-weight: 600; padding: 16px 24px; border-radius: 16px; z-index: 10000; opacity: 0; transition: all 0.3s; }
    #toast.show { visibility: visible; opacity: 1; transform: translate(-50%, 0); }
  </style>
</head>
<body>
  <div id="global-loader" class="glass-effect"><div class="spinner"></div><p id="loader-text">Initializing...</p></div>
  <div id="toast" class="glass-effect"><span id="toast-msg"></span></div>

  <div id="login-screen">
    <h2 style="font-family: 'Plus Jakarta Sans'; font-size: 28px; margin-bottom: 8px;">Terminal Login</h2>
    <p style="color: var(--text-soft); margin-bottom: 32px;">Secure Supabase connection.</p>
    <input type="email" id="email-input" class="input-field" placeholder="Branch Email" />
    <input type="password" id="password-input" class="input-field" placeholder="Password" />
    <button id="login-btn">Secure Login</button>
    <div id="error-msg"></div>
  </div>

  <div id="dashboard">
    <div class="header glass-effect">
      <div>
        <div style="font-weight: 800; font-size: 20px;">RJ Mobile</div>
        <div id="detected-branch-display" style="font-size: 12px; color: var(--primary); font-weight: 700; text-transform: uppercase;">Detecting...</div>
      </div>
      <button id="logout-btn" class="btn-secondary">Log Out</button>
    </div>

    <div class="main-card">
      <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div id="flash-overlay"></div>
      </div>
      <select id="staff-select" class="input-field"><option value="" disabled selected>Loading staff...</option></select>
      <div class="btn-row">
        <button id="btn-clock-in" class="btn-action btn-in">Clock In + Photo</button>
        <button id="btn-clock-out" class="btn-action btn-out">Clock Out + Photo</button>
      </div>
    </div>
  </div>

  <script>
    // --- SUPABASE CONFIGURATION ---
    const SUPABASE_URL = 'YOUR_SUPABASE_URL_HERE';
    const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentBranchData = null;
    let cameraActive = false;
    let isProcessing = false;

    function showToast(msg) {
      const t = document.getElementById('toast');
      document.getElementById('toast-msg').innerText = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 4000);
    }

    // Auth State Listener
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (session) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';
        await initializeTerminal(session.user.email);
      } else {
        document.getElementById('global-loader').style.display = 'none';
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
      }
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
      document.getElementById('error-msg').style.display = 'none';
      const email = document.getElementById('email-input').value;
      const password = document.getElementById('password-input').value;
      document.getElementById('global-loader').style.display = 'flex';
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        document.getElementById('global-loader').style.display = 'none';
        document.getElementById('error-msg').innerText = error.message;
        document.getElementById('error-msg').style.display = 'block';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await supabase.auth.signOut();
    });

    async function initializeTerminal(email) {
      document.getElementById('loader-text').innerText = 'Validating Branch & IP...';
      
      try {
        // 1. Fetch Branch config from DB
        const { data: branchInfo, error: branchErr } = await supabase
          .from('branches_directory')
          .select('*')
          .eq('email', email)
          .single();
          
        if (branchErr || !branchInfo) {
          showToast("Error: Email not mapped to any branch in Settings.");
          await supabase.auth.signOut();
          return;
        }
        currentBranchData = branchInfo;
        document.getElementById('detected-branch-display').innerText = branchInfo.branch_name;

        // 2. IP Validation
        if (branchInfo.ip_address && branchInfo.ip_address.trim() !== "") {
          const ipRes = await fetch('https://api.ipify.org?format=json');
          const ipData = await ipRes.json();
          if (ipData.ip !== branchInfo.ip_address.trim()) {
            alert(`IP Blocked! Your current Wi-Fi IP (${ipData.ip}) does not match the Admin Settings for this branch.`);
            document.getElementById('btn-clock-in').disabled = true;
            document.getElementById('btn-clock-out').disabled = true;
          }
        }

        // 3. Load Staff
        const { data: staffList } = await supabase.from('staff_directory').select('name').order('name');
        let options = '<option value="" disabled selected>Tap to select your name</option>';
        if (staffList) staffList.forEach(s => options += `<option value="${s.name}">${s.name}</option>`);
        document.getElementById('staff-select').innerHTML = options;

        if(!cameraActive) startCamera();
        document.getElementById('global-loader').style.display = 'none';

      } catch (err) {
        showToast("Initialization failed. Check network.");
      }
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById('video').srcObject = stream;
        cameraActive = true;
      } catch (err) { showToast("Camera Access Denied"); }
    }

    async function logAttendance(targetAction) {
      if (isProcessing) return;
      const staffSelected = document.getElementById('staff-select').value;
      if (!staffSelected) return showToast("Select your name first!");

      isProcessing = true;
      document.getElementById('flash-overlay').classList.add('flash');
      setTimeout(() => document.getElementById('flash-overlay').classList.remove('flash'), 150);

      const video = document.getElementById('video');
      const hiddenCanvas = document.createElement('canvas');
      hiddenCanvas.width = video.videoWidth || 1280;
      hiddenCanvas.height = video.videoHeight || 720;
      const ctx = hiddenCanvas.getContext('2d');
      ctx.translate(hiddenCanvas.width, 0); ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
      const photoBase64 = hiddenCanvas.toDataURL('image/jpeg', 0.8);

      const { error } = await supabase.from('attendance_logs').insert([{
        employee_name: staffSelected,
        branch: currentBranchData.branch_name,
        action: targetAction,
        photo_capture: photoBase64
      }]);

      if (error) showToast("Database error.");
      else { showToast(`Success: ${targetAction} logged!`); document.getElementById('staff-select').value = ""; }
      
      setTimeout(() => isProcessing = false, 2000);
    }

    document.getElementById('btn-clock-in').addEventListener('click', () => logAttendance('Clock In'));
    document.getElementById('btn-clock-out').addEventListener('click', () => logAttendance('Clock Out'));
  </script>
</body>
</html>
