<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RJ Mobile - Smart Scanner</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet" />
  
  <!-- Face API Library -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base: #09090b; --card-bg: #18181b; --card-border: #27272a;
      --primary: #3b82f6; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
      --text-main: #f4f4f5; --text-soft: #a1a1aa;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg-base); color: var(--text-main);
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
      padding: 20px; overflow: hidden;
    }
    h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px; margin-bottom: 20px; text-align: center; }
    
    /* Branch Selector */
    .branch-selector {
      background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-main);
      padding: 12px 20px; border-radius: 12px; font-size: 16px; font-weight: 600;
      margin-bottom: 20px; width: 100%; max-width: 500px; outline: none; cursor: pointer;
    }

    /* Camera Area */
    .scanner-container {
      position: relative; width: 100%; max-width: 500px; aspect-ratio: 3/4;
      background: #000; border-radius: 24px; border: 2px solid var(--card-border);
      overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
    
    /* Status & Prompts */
    .status-badge {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); padding: 8px 16px;
      border-radius: 20px; font-size: 14px; font-weight: 600; z-index: 10;
      white-space: nowrap; transition: 0.3s ease; border: 1px solid rgba(255,255,255,0.1);
    }
    
    .liveness-prompt {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: var(--warning); color: #000; padding: 12px 24px;
      border-radius: 30px; font-size: 16px; font-weight: 800; z-index: 10;
      display: none; animation: pulse 1.5s infinite; text-align: center; width: 80%;
    }
    @keyframes pulse { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } 100% { transform: translateX(-50%) scale(1); } }

    /* Action Modal (Clock In / Out) */
    .action-modal {
      position: absolute; inset: 0; background: rgba(9, 9, 11, 0.9); backdrop-filter: blur(10px);
      z-index: 20; display: none; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    .action-modal h2 { font-size: 28px; font-weight: 800; color: var(--success); margin-bottom: 8px; }
    .action-modal p { font-size: 16px; color: var(--text-soft); margin-bottom: 32px; }
    
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; }
    .btn {
      padding: 20px; border: none; border-radius: 16px; font-size: 18px; font-weight: 800;
      cursor: pointer; color: #fff; transition: 0.2s;
    }
    .btn-in { background: var(--success); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
    .btn-out { background: var(--danger); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
    .btn-cancel { grid-column: span 2; background: transparent; border: 1px solid var(--card-border); margin-top: 10px; padding: 12px; }
    .btn:active { transform: scale(0.95); }

    /* Loading Screen */
    #global-loader {
      position: fixed; inset: 0; background: var(--bg-base); z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .spinner { width: 50px; height: 50px; border: 4px solid var(--card-border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="global-loader">
    <div class="spinner"></div>
    <h2 style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 20px;">Starting AI Scanner...</h2>
    <p style="color: var(--text-soft); font-size: 14px; margin-top: 8px;" id="load-text">Loading secure models</p>
  </div>

  <h1>RJ Smart Terminal</h1>
  
  <select id="branch-selector" class="branch-selector">
    <option value="" disabled selected>-- Select Station Location --</option>
    <option value="Murlipura, 1 Number">Murlipura, 1 Number</option>
    <option value="VKI, 17 Number">VKI, 17 Number</option>
    <option value="VKI, Lohamandi">VKI, Lohamandi</option>
    <option value="Shastri Nagar">Shastri Nagar</option>
    <option value="Murlipura, 6 Number">Murlipura, 6 Number</option>
  </select>

  <div class="scanner-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay-canvas"></canvas>
    
    <div id="status-badge" class="status-badge">Stand in front of the camera</div>
    <div id="liveness-prompt" class="liveness-prompt">😊 Please Smile to Verify</div>

    <div id="action-modal" class="action-modal">
      <h2 id="welcome-name">Welcome!</h2>
      <p>Log your attendance for this shift.</p>
      <div class="btn-grid">
        <button class="btn btn-in" id="btn-clock-in">Clock IN</button>
        <button class="btn btn-out" id="btn-clock-out">Clock OUT</button>
        <button class="btn btn-cancel" id="btn-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    // 1. Firebase Configuration (Matches your Admin Panel)
    const firebaseConfig = { 
      apiKey: "AIzaSyBsAsMlKJqoyOS27IVotwszVvO1ZFCGABs", 
      authDomain: "staff-review-935f3.firebaseapp.com", 
      projectId: "staff-review-935f3", 
      storageBucket: "staff-review-935f3.firebasestorage.app", 
      messagingSenderId: "91819642184", 
      appId: "1:91819642184:web:9b78814e6efcfb811a608d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Variables
    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay-canvas');
    const branchSelector = document.getElementById('branch-selector');
    const statusBadge = document.getElementById('status-badge');
    const livenessPrompt = document.getElementById('liveness-prompt');
    const actionModal = document.getElementById('action-modal');
    
    let labeledFaceDescriptors = [];
    let faceMatcher = null;
    let isProcessing = false;
    let recognizedStaffName = null;
    let scanInterval;

    // Web Audio API for the Digital Beep
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep() {
      if(audioCtx.state === 'suspended') audioCtx.resume();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); // High pitched beep
      gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.15);
    }

    // Helper: Update Loading Text
    function setLoadText(msg) { document.getElementById('load-text').innerText = msg; }

    // Start App Flow
    async function startApp() {
      try {
        setLoadText("Loading AI Models...");
        // Load the 4 required models (including faceExpressionNet for Liveness)
        await Promise.all([
          faceapi.nets.ssdMobilenetv1.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models'),
          faceapi.nets.faceLandmark68Net.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models'),
          faceapi.nets.faceRecognitionNet.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models'),
          faceapi.nets.faceExpressionNet.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models')
        ]);

        setLoadText("Syncing Staff Database...");
        await loadRegisteredFaces();

        setLoadText("Starting Camera...");
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
        video.srcObject = stream;

        // Hide Loader once video plays
        video.addEventListener('play', () => {
          document.getElementById('global-loader').style.display = 'none';
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          startScanningLoop();
        });

      } catch (error) {
        console.error(error);
        alert("System Error: Could not initialize camera or database. Check internet connection and permissions.");
      }
    }

    // Fetch Faces from Firebase
    async function loadRegisteredFaces() {
      const snapshot = await getDocs(collection(db, "registered_faces"));
      if (snapshot.empty) {
        alert("Warning: No registered faces found in database.");
        return;
      }
      
      snapshot.forEach(doc => {
        const data = doc.data();
        if (data.descriptor && data.employee_name) {
          const descArray = new Float32Array(data.descriptor);
          labeledFaceDescriptors.push(new faceapi.LabeledFaceDescriptors(data.employee_name, [descArray]));
        }
      });
      faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.45); // Strict 0.45 threshold
    }

    // Main Scanning Loop
    function startScanningLoop() {
      scanInterval = setInterval(async () => {
        if (isProcessing) return;

        const displaySize = { width: video.videoWidth, height: video.videoHeight };
        faceapi.matchDimensions(canvas, displaySize);

        // Detect Face + Landmarks + Expressions + Recognition Descriptor
        const detection = await faceapi.detectSingleFace(video)
          .withFaceLandmarks()
          .withFaceExpressions()
          .withFaceDescriptor();

        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (detection && faceMatcher) {
          const bestMatch = faceMatcher.findBestMatch(detection.descriptor);

          if (bestMatch.label !== 'unknown') {
            statusBadge.style.background = 'var(--primary)';
            statusBadge.innerText = `Subject Identified: ${bestMatch.label}`;

            // --- LIVENESS DETECTION (Smile Check) ---
            const smileScore = detection.expressions.happy;
            
            if (smileScore > 0.6) {
              // Liveness Passed!
              livenessPrompt.style.display = 'none';
              triggerSuccessProtocol(bestMatch.label);
            } else {
              // Ask them to smile to prove they aren't a photo
              livenessPrompt.style.display = 'block';
            }

          } else {
            statusBadge.style.background = 'var(--danger)';
            statusBadge.innerText = "Face not recognized in database";
            livenessPrompt.style.display = 'none';
          }
        } else {
          statusBadge.style.background = 'rgba(0,0,0,0.7)';
          statusBadge.innerText = "Searching for face...";
          livenessPrompt.style.display = 'none';
        }
      }, 300); // Scans every 300ms
    }

    // Triggered when Face + Smile is confirmed
    function triggerSuccessProtocol(name) {
      isProcessing = true;
      recognizedStaffName = name;
      
      playBeep(); // Audio Beep
      
      document.getElementById('welcome-name').innerText = `Welcome back, ${name}!`;
      actionModal.style.display = 'flex';
      
      // Stop drawing bounding boxes
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // Cancel Button
    document.getElementById('btn-cancel').addEventListener('click', () => {
      actionModal.style.display = 'none';
      recognizedStaffName = null;
      setTimeout(() => { isProcessing = false; }, 1000); // 1 sec delay before rescanning
    });

    // Clock In & Clock Out Logic
    document.getElementById('btn-clock-in').addEventListener('click', () => submitLog('Clock In'));
    document.getElementById('btn-clock-out').addEventListener('click', () => submitLog('Clock Out'));

    async function submitLog(actionType) {
      const branch = branchSelector.value;
      if (!branch) {
        alert("SYSTEM HALT: Please select your Branch Station at the top of the screen first.");
        return;
      }

      // Capture Photo for Uniform Review Dashboard
      const photoCanvas = document.createElement('canvas');
      photoCanvas.width = video.videoWidth;
      photoCanvas.height = video.videoHeight;
      photoCanvas.getContext('2d').drawImage(video, 0, 0);
      const photoBase64 = photoCanvas.toDataURL('image/jpeg', 0.6); // Compress slightly

      actionModal.innerHTML = `<div class="spinner"></div><h2>Saving Secure Log...</h2>`;

      try {
        await addDoc(collection(db, "attendance_logs"), {
          employee_name: recognizedStaffName,
          action: actionType,
          branch: branch,
          timestamp: new Date(),
          photo_capture: photoBase64,
          uniform_reviewed: false // Admin will check this later
        });

        actionModal.innerHTML = `<h2 style="color: var(--success); font-size: 32px;">Success!</h2><p>${actionType} recorded.</p>`;
        
        // Reset UI after 2 seconds
        setTimeout(() => {
          actionModal.style.display = 'none';
          // Restore buttons for next person
          actionModal.innerHTML = `
            <h2 id="welcome-name">Welcome!</h2><p>Log your attendance for this shift.</p>
            <div class="btn-grid">
              <button class="btn btn-in" id="btn-clock-in">Clock IN</button>
              <button class="btn btn-out" id="btn-clock-out">Clock OUT</button>
              <button class="btn btn-cancel" id="btn-cancel">Cancel</button>
            </div>
          `;
          // Re-attach listeners because we overwrote innerHTML
          document.getElementById('btn-clock-in').addEventListener('click', () => submitLog('Clock In'));
          document.getElementById('btn-clock-out').addEventListener('click', () => submitLog('Clock Out'));
          document.getElementById('btn-cancel').addEventListener('click', () => {
            actionModal.style.display = 'none'; recognizedStaffName = null; setTimeout(() => { isProcessing = false; }, 1000);
          });
          
          recognizedStaffName = null;
          isProcessing = false;
        }, 2000);

      } catch (error) {
        console.error(error);
        alert("Failed to save to database. Check internet connection.");
        location.reload(); // Force restart on critical failure
      }
    }

    // Auto-Save Branch Selection locally so they don't have to select it every day
    if (localStorage.getItem('rj_branch_pref')) {
      branchSelector.value = localStorage.getItem('rj_branch_pref');
    }
    branchSelector.addEventListener('change', (e) => {
      localStorage.setItem('rj_branch_pref', e.target.value);
    });

    // Boot App
    startApp();
  </script>
</body>
</html>
