<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance | Secure Terminal</title>
  
  <script>
    if (localStorage.getItem('rj_theme') === 'light') { document.documentElement.classList.add('light-theme'); }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base: #09090b; --card-bg: #18181b; --card-bg-alpha: rgba(24, 24, 27, 0.75);
      --card-border: #27272a; --primary: #3b82f6; --primary-hover: #60a5fa;
      --primary-alpha: rgba(59, 130, 246, 0.15); --text-main: #f4f4f5; --text-soft: #a1a1aa;
      --success: #10b981; --success-alpha: rgba(16, 185, 129, 0.15); --danger: #ef4444;
      --danger-alpha: rgba(239, 68, 68, 0.15); --input-bg: #09090b;
      --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.4); --shadow-glow: 0 10px 30px rgba(59, 130, 246, 0.2);
    }
    html.light-theme {
      --bg-base: #f8fafc; --card-bg: #ffffff; --card-bg-alpha: rgba(255, 255, 255, 0.85);
      --card-border: #e2e8f0; --primary: #4f46e5; --primary-hover: #6366f1;
      --primary-alpha: rgba(79, 70, 229, 0.1); --text-main: #0f172a; --text-soft: #64748b;
      --input-bg: #f1f5f9; --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg-base); color: var(--text-main); font-size: 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; transition: background-color 0.4s ease; overflow-x: hidden; }
    .brand-title, .btn-action { font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass-effect { background: var(--card-bg-alpha); backdrop-filter: blur(16px); border: 1px solid var(--card-border); }

    #global-loader { position: fixed; inset: 0; background: var(--bg-base); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: var(--text-soft); font-weight: 500; }
    .spinner { width: 48px; height: 48px; border: 4px solid var(--card-border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s infinite; margin-bottom: 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #login-screen { display: none; background: var(--card-bg); padding: 48px 40px; border-radius: 24px; box-shadow: var(--shadow-soft); text-align: center; width: 100%; max-width: 420px; margin-top: 12vh; border: 1px solid var(--card-border); }
    #login-screen h2 { font-weight: 800; font-size: 28px; margin-bottom: 8px; }
    #login-screen p { color: var(--text-soft); margin-bottom: 32px; }
    .input-field { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--card-border); background: var(--input-bg); color: var(--text-main); margin-bottom: 16px; outline: none; font-size: 16px; font-weight: 600; cursor: pointer;}
    .input-field:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-alpha); background: var(--card-bg); }
    #login-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--primary); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    #login-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }
    #error-msg { color: var(--danger); font-size: 14px; margin-top: 16px; display: none; background: var(--danger-alpha); padding: 10px; border-radius: 10px; }
    
    .password-wrapper { position: relative; width: 100%; margin-bottom: 16px; }
    .password-wrapper .input-field { margin-bottom: 0; padding-right: 48px; }
    .toggle-password { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-soft); cursor: pointer; display: flex; transition: color 0.2s; }
    .toggle-password:hover { color: var(--primary); }

    #dashboard { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 500px; }
    .header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 16px; padding: 16px 24px; border-radius: 20px; box-shadow: var(--shadow-soft); }
    .brand-area { display: flex; align-items: center; gap: 14px; }
    .brand-title { font-size: 20px; font-weight: 800; }
    .brand-tag { font-size: 12px; color: var(--primary); font-weight: 700; text-transform: uppercase; }
    .header-controls { display: flex; gap: 12px; align-items: center; }
    #theme-toggle { background: var(--input-bg); border: 1px solid var(--card-border); color: var(--text-soft); cursor: pointer; padding: 10px; border-radius: 12px; }
    .btn-secondary { background: transparent; border: 1px solid var(--card-border); color: var(--text-main); padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 600; }

    /* Changed overflow from hidden to visible so dropdown can break out of the card */
    .main-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 24px; padding: 24px; width: 100%; position: relative; overflow: visible; margin-bottom: 24px; }
    .card-border-top::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--primary), #3b82f6); border-top-left-radius: 24px; border-top-right-radius: 24px; }
    
    /* --- CUSTOM DROPDOWN STYLES --- */
    .custom-dropdown { position: relative; width: 100%; margin-top: 8px; }
    .custom-dropdown-trigger { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--card-border); background: var(--input-bg); color: var(--text-soft); font-size: 16px; font-weight: 600; cursor: pointer; text-align: left; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
    .custom-dropdown-trigger:hover { border-color: var(--card-border); background: var(--card-bg); }
    .custom-dropdown-trigger.selected { color: var(--text-main); }
    .custom-dropdown-trigger.disabled { opacity: 0.5; cursor: not-allowed; }
    
    .custom-dropdown-menu { position: absolute; top: 100%; left: 0; right: 0; margin-top: 8px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; box-shadow: var(--shadow-glow); z-index: 100; display: none; flex-direction: column; overflow: hidden; }
    .custom-dropdown-menu.show { display: flex; }
    .custom-dropdown-search-wrapper { padding: 12px; border-bottom: 1px solid var(--card-border); background: var(--card-bg); }
    .custom-dropdown-search { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--card-border); background: var(--input-bg); color: var(--text-main); outline: none; font-size: 15px; font-weight: 500; }
    .custom-dropdown-search:focus { border-color: var(--primary); }
    .custom-dropdown-options { max-height: 220px; overflow-y: auto; padding: 8px; }
    
    /* Custom Scrollbar */
    .custom-dropdown-options::-webkit-scrollbar { width: 6px; }
    .custom-dropdown-options::-webkit-scrollbar-track { background: transparent; }
    .custom-dropdown-options::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 10px; }
    
    .custom-option { padding: 12px 16px; border-radius: 8px; cursor: pointer; color: var(--text-main); font-weight: 500; transition: background 0.2s; }
    .custom-option:hover { background: var(--primary-alpha); color: var(--primary); }
    .custom-option.disabled-option { color: var(--text-soft); cursor: default; text-align: center; }
    .custom-option.disabled-option:hover { background: transparent; color: var(--text-soft); }

    #video-container { position: relative; background: #000; border-radius: 16px; overflow: hidden; width: 100%; height: 380px; margin-bottom: 20px; border: 1px solid var(--card-border); display: flex; align-items: center; justify-content: center; }
    #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    
    #flash-overlay { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; transition: opacity 0.1s; z-index: 20; }
    #flash-overlay.flash { opacity: 0.8; }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 10px; }
    .btn-action { padding: 16px; border-radius: 14px; border: none; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-in { background: var(--success); box-shadow: 0 4px 12px var(--success-alpha); }
    .btn-out { background: var(--danger); box-shadow: 0 4px 12px var(--danger-alpha); }
    .btn-action:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(50%); transform: none !important; box-shadow: none !important; }
    .btn-action:not(:disabled):hover { filter: brightness(1.1); transform: translateY(-2px); }

    #toast { visibility: hidden; min-width: 300px; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px 24px; position: fixed; z-index: 10000; bottom: 40px; left: 50%; transform: translate(-50%, 20px); font-size: 15px; font-weight: 600; color: var(--text-main); border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s, transform 0.3s, visibility 0.3s; }
    #toast.show { visibility: visible; opacity: 1; transform: translate(-50%, 0); }
  </style>
</head>
<body>

  <div id="global-loader" class="glass-effect"><div class="spinner"></div><p>Connecting Secure Session...</p></div>
  <div id="toast" class="glass-effect"><div id="toast-icon"></div><div id="toast-msg"></div></div>

  <!-- Login Screen -->
  <div id="login-screen">
    <h2>Attendance Terminal</h2>
    <p>Sign in to unlock your branch scanner.</p>
    <input type="email" id="email-input" class="input-field" placeholder="branch@rjmobile.com" />
    <div class="password-wrapper">
      <input type="password" id="password-input" class="input-field" placeholder="Enter terminal password" />
      <button id="toggle-password-btn" class="toggle-password" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
    </div>
    <button id="login-btn">Secure Login</button>
    <div id="error-msg">Authentication failed.</div>
  </div>

  <!-- Main Terminal Application -->
  <div id="dashboard">
    <div class="header glass-effect">
      <div class="brand-area">
        <div>
          <div class="brand-title">Terminal POS</div>
          <div class="brand-tag" id="detected-branch-display">Identifying Location...</div>
        </div>
      </div>
      <div class="header-controls">
        <button id="theme-toggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
        <button id="logout-btn" class="btn-secondary">Log Out</button>
      </div>
    </div>

    <!-- Active Cashier Select -->
    <div class="main-card card-border-top" style="padding: 16px 24px; margin-bottom: 16px;">
      <label style="font-size: 12px; font-weight: 700; color: var(--text-soft); text-transform: uppercase;">Active Employee</label>
      
      <!-- Custom Search Dropdown Component -->
      <div class="custom-dropdown" id="staff-dropdown">
        <div class="custom-dropdown-trigger disabled" id="staff-dropdown-trigger">
          <span id="staff-trigger-text">Connecting...</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        
        <div class="custom-dropdown-menu" id="staff-dropdown-menu">
          <div class="custom-dropdown-search-wrapper">
            <input type="text" id="staff-search" class="custom-dropdown-search" placeholder="🔍 Search employee name..." autocomplete="off" />
          </div>
          <div class="custom-dropdown-options" id="staff-options">
            <div class="custom-option disabled-option">Loading...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Scanner Feed Card -->
    <!-- Wrapping in an overflow-hidden div specifically for video border radiuses to prevent clipping into the dropdown above it -->
    <div class="main-card" style="overflow: hidden;">
      <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div id="flash-overlay"></div>
      </div>

      <div class="btn-row">
        <!-- Buttons disabled by default until name is selected -->
        <button id="btn-clock-in" class="btn-action btn-in" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> 
          In + Photo
        </button>
        <button id="btn-clock-out" class="btn-action btn-out" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> 
          Out + Photo
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // SUPABASE CREDENTIALS
    const SUPABASE_URL = 'https://rezumapzlsjnkitxvsul.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlenVtYXB6bHNqbmtpdHh2c3VsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNTY2NjUsImV4cCI6MjA5OTkzMjY2NX0.IVUZVjZUuiM9qTcKAIIxJth_zSIGJUWTaubUV4Fy0_Y';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    let currentBranch = ""; 
    let cameraActive = false;
    let isProcessing = false;
    let masterStaffNames = []; 
    let staffSelected = ""; // Tracks the currently active user
    
    const video = document.getElementById('video');
    const flashOverlay = document.getElementById('flash-overlay');
    const btnIn = document.getElementById('btn-clock-in');
    const btnOut = document.getElementById('btn-clock-out');

    function displayToast(msg, statusType = "success") {
      const toast = document.getElementById('toast');
      const icon = document.getElementById('toast-icon');
      document.getElementById('toast-msg').innerText = msg;
      
      if (statusType === "success") icon.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5"><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
      else if (statusType === "error") icon.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
      else icon.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
      
      toast.className = "glass-effect show";
      if (toast.timeout) clearTimeout(toast.timeout);
      toast.timeout = setTimeout(() => { toast.className = "glass-effect"; }, 4000);
    }

    // --- AUTHENTICATION ENGINE ---
    async function checkUser() {
        const { data: { session } } = await supabase.auth.getSession();
        handleAuthChange(session?.user);
    }
    
    supabase.auth.onAuthStateChange((event, session) => { handleAuthChange(session?.user); });

    // --- AUTHENTICATION & IP SECURITY ENGINE ---
    async function handleAuthChange(user) {
        document.getElementById('global-loader').style.display = 'none';
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            
            const email = user.email.toLowerCase();
            
            // 1. Fetch branch name AND ip_address from Database
            const { data: branchData } = await supabase.from('branches_directory').select('branch_name, ip_address').eq('email', email).single();
            
            let allowedIp = "";
            if (branchData) { 
                currentBranch = branchData.branch_name; 
                allowedIp = branchData.ip_address || ""; 
            }
            else if (email.includes('murlipura1')) currentBranch = "Murlipura, 1 Number";
            else if (email.includes('vki17')) currentBranch = "VKI, 17 Number";
            else if (email.includes('lohamandi')) currentBranch = "VKI, Lohamandi";
            else if (email.includes('shastri')) currentBranch = "Shastri Nagar";
            else if (email.includes('murlipura6')) currentBranch = "Murlipura, 6 Number";
            else currentBranch = "Central / Unassigned Branch";

            document.getElementById('detected-branch-display').innerHTML = currentBranch;

            // 2. IP Lock Verification Logic
            if (allowedIp.trim() !== "") {
                try {
                    displayToast("Verifying Network Security...", "primary");
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    const currentIp = ipData.ip;
                    
                    if (currentIp !== allowedIp.trim()) {
                        // IP does not match - BLOCK ACCESS
                        document.getElementById('detected-branch-display').innerHTML = `${currentBranch} <span style="color:var(--danger)">[NETWORK BLOCKED]</span>`;
                        document.getElementById('staff-dropdown-trigger').classList.add('disabled');
                        document.getElementById('staff-trigger-text').innerText = "Access Denied: Connect to Branch Wi-Fi";
                        displayToast("Security Alert: Invalid Wi-Fi Network.", "error");
                        return; // Stop execution here (Camera won't start, logs blocked)
                    } else {
                        displayToast("Network Secured.", "success");
                    }
                } catch (err) {
                    console.error("IP Check Failed", err);
                    displayToast("Network Check Failed. Check Internet connection.", "error");
                    return;
                }
            }
            
            // 3. If IP matches (or no IP lock is set), load staff and camera
            const { data: sData } = await supabase.from('staff_directory').select('name').order('name');
            if (sData) {
                masterStaffNames = sData.map(s => s.name);
                
                document.getElementById('staff-dropdown-trigger').classList.remove('disabled');
                document.getElementById('staff-trigger-text').innerText = "Tap to select your name...";
                
                renderStaffDropdown(masterStaffNames);
            }
            
            if (!cameraActive) {
                startCamera();
            }
        } else {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            currentBranch = "";
            btnIn.disabled = true;
            btnOut.disabled = true;
        }
    }
    checkUser();

    // --- CUSTOM DROPDOWN ENGINE ---
    const dropdownTrigger = document.getElementById('staff-dropdown-trigger');
    const dropdownMenu = document.getElementById('staff-dropdown-menu');
    const searchInput = document.getElementById('staff-search');
    const triggerText = document.getElementById('staff-trigger-text');

    function renderStaffDropdown(list) {
        const optionsContainer = document.getElementById('staff-options');
        if (list.length === 0) {
            optionsContainer.innerHTML = `<div class="custom-option disabled-option">No results found</div>`;
            return;
        }
        
        optionsContainer.innerHTML = list.map(name => `<div class="custom-option" data-value="${name}">${name}</div>`).join('');
        
        // Attach click listeners to options
        document.querySelectorAll('.custom-option:not(.disabled-option)').forEach(opt => {
            opt.addEventListener('click', () => {
                staffSelected = opt.getAttribute('data-value');
                triggerText.innerText = staffSelected;
                dropdownTrigger.classList.add('selected');
                dropdownMenu.classList.remove('show');
                
                // Fire validation
                checkStaffStatus(staffSelected);
            });
        });
    }

    // Toggle menu Open/Close
    dropdownTrigger.addEventListener('click', () => {
        if (dropdownTrigger.classList.contains('disabled')) return;
        dropdownMenu.classList.toggle('show');
        
        if (dropdownMenu.classList.contains('show')) {
            searchInput.value = ""; // Clear search on open
            renderStaffDropdown(masterStaffNames); // Reset list to full
            searchInput.focus(); // Focus instantly
        }
    });

    // Filtering logic via Input
    searchInput.addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase();
        const filteredList = masterStaffNames.filter(name => name.toLowerCase().includes(searchTerm));
        renderStaffDropdown(filteredList);
    });

    // Close Dropdown when clicking outside
    document.addEventListener('click', (e) => {
        const dropdown = document.getElementById('staff-dropdown');
        if (dropdown && !dropdown.contains(e.target)) {
            dropdownMenu.classList.remove('show');
        }
    });


    document.getElementById('login-btn').addEventListener('click', async () => {
      const e = document.getElementById('email-input').value, p = document.getElementById('password-input').value, msg = document.getElementById('error-msg');
      msg.style.display = 'none'; 
      const { error } = await supabase.auth.signInWithPassword({ email: e, password: p });
      if(error) { msg.style.display = 'block'; msg.innerText = error.message; }
    });
    
    document.getElementById('logout-btn').addEventListener('click', async () => { await supabase.auth.signOut(); });
    
    document.getElementById('password-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('login-btn').click(); });
    
    document.getElementById('toggle-password-btn').addEventListener('click', () => {
      const passInput = document.getElementById('password-input');
      if (passInput.type === 'password') { passInput.type = 'text'; document.getElementById('toggle-password-btn').style.color = 'var(--primary)'; } else { passInput.type = 'password'; document.getElementById('toggle-password-btn').style.color = 'var(--text-soft)'; }
    });

    // --- CAMERA ENGINE (With Detailed Error Handling) ---
    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        displayToast("Security Error: Run on HTTPS or Localhost", "error");
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
        video.srcObject = stream;
        cameraActive = true;
      } catch (err) {
        console.error("Camera Error:", err);
        if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
            displayToast("Camera Access Denied by Browser", "error");
        } else if (err.name === "NotFoundError" || err.name === "DevicesNotFoundError") {
            displayToast("No Camera Hardware Found!", "error");
        } else if (err.name === "NotReadableError" || err.name === "TrackStartError") {
            displayToast("Camera is already in use by another app", "error");
        } else {
            displayToast(`Camera Error: ${err.message}`, "error");
        }
      }
    }

    function triggerFlash() {
      flashOverlay.classList.add('flash');
      setTimeout(() => { flashOverlay.classList.remove('flash'); }, 150);
    }

    // --- CHECK IN/OUT STRICT VALIDATION LOGIC ---
    async function checkStaffStatus(staffName) {
        if (!staffName) return;

        // Reset and lock buttons while checking
        btnIn.disabled = true;
        btnOut.disabled = true;
        displayToast(`Checking status for ${staffName}...`, "primary");

        try {
            // Find today's logs for this specific user
            const todayStart = new Date();
            todayStart.setHours(0,0,0,0);

            const { data, error } = await supabase
                .from('attendance_logs')
                .select('action')
                .eq('employee_name', staffName)
                .gte('timestamp', todayStart.toISOString())
                .order('timestamp', { ascending: false });

            if (error) throw error;

            let hasClockedIn = false;
            let hasClockedOut = false;

            if (data && data.length > 0) {
                hasClockedIn = data.some(log => log.action === 'Clock In');
                hasClockedOut = data.some(log => log.action === 'Clock Out');
            }

            if (hasClockedIn && hasClockedOut) {
                // Done for the day (Strict 1 In, 1 Out)
                btnIn.disabled = true;
                btnOut.disabled = true;
                displayToast(`Shift Complete! You have already clocked in and out today.`, "success");
            } else if (hasClockedIn && !hasClockedOut) {
                // Clocked In, waiting for Clock Out
                btnIn.disabled = true;
                btnOut.disabled = false;
                displayToast(`Welcome back ${staffName.split(' ')[0]}! Ready to Clock Out?`, "success");
            } else {
                // Not clocked in at all -> Can only Clock In
                btnIn.disabled = false;
                btnOut.disabled = true;
                displayToast(`No records found today. Please Clock In.`, "primary");
            }
        } catch (err) {
            console.error("Error fetching status:", err);
            displayToast("Failed to verify status. Check internet.", "error");
        }
    }

    // --- ATTENDANCE & COMPRESSED PHOTO UPLOAD LOGIC ---
    async function logAttendance(targetAction) {
      if (!staffSelected) {
        displayToast("Please select your name first!", "error");
        return;
      }
      
      if (isProcessing) return;
      isProcessing = true;
      
      triggerFlash();
      displayToast(`Uploading securely...`, "primary"); 
      
      // CREATE SMALLER CANVAS FOR FASTER UPLOAD & AVOID DB REJECTION
      const hiddenCanvas = document.createElement('canvas');
      hiddenCanvas.width = 480; // Compressed width
      hiddenCanvas.height = 640; // Compressed height
      const ctx = hiddenCanvas.getContext('2d');
      
      // Mirror the image to match the video feed
      ctx.translate(hiddenCanvas.width, 0);
      ctx.scale(-1, 1);
      
      let capturedBase64 = "";
      try {
        ctx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
        // LOWER QUALITY (0.6) to prevent DB Rejection / Out of Memory
        capturedBase64 = hiddenCanvas.toDataURL('image/jpeg', 0.6); 
      } catch (err) {
        console.error("Camera Capture Error", err);
      }

      try {
        const { error } = await supabase.from('attendance_logs').insert([{
          employee_name: staffSelected,
          branch: currentBranch, 
          action: targetAction,
          timestamp: new Date().toISOString(), // EXPLICIT TIMESTAMP ADDED
          photo_capture: capturedBase64
        }]);
        
        if (error) throw error;
        
        displayToast(`Success: ${targetAction} verified!`, "success");
        
        // Reset Dropdown & Lock Buttons instantly after successful log
        staffSelected = "";
        triggerText.innerText = "Tap to select your name...";
        dropdownTrigger.classList.remove('selected');
        
        btnIn.disabled = true;
        btnOut.disabled = true;
        
        setTimeout(() => { isProcessing = false; }, 2000); 
        
      } catch (err) {
        console.error(err);
        displayToast("Database transmission failed. Try again.", "error");
        isProcessing = false;
      }
    }

    document.getElementById('btn-clock-in').addEventListener('click', () => logAttendance('Clock In'));
    document.getElementById('btn-clock-out').addEventListener('click', () => logAttendance('Clock Out'));

    document.getElementById('theme-toggle').addEventListener('click', () => { 
        const isLight = document.documentElement.classList.toggle('light-theme'); 
        localStorage.setItem('rj_theme', isLight ? 'light' : 'dark'); 
    });
  </script>
</body>
