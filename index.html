<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance | Professional Terminal</title>
  
  <script>
    if (localStorage.getItem('rj_theme') === 'light') { document.documentElement.classList.add('light-theme'); }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    /* =========================================================
       1. ROOT VARIABLES & THEME (Matched to Admin/POS)
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      /* Dark Theme (Default) - Refined Slate Palette */
      --bg-base: #0f172a; 
      --bg-surface: #1e293b;
      --card-bg: #1e293b; 
      --card-bg-alpha: rgba(30, 41, 59, 0.85);
      --card-border: #334155;
      
      --primary: #3b82f6; 
      --primary-hover: #2563eb; 
      --primary-alpha: rgba(59, 130, 246, 0.15);
      
      --text-main: #f8fafc; 
      --text-soft: #94a3b8;
      
      --success: #10b981; --success-alpha: rgba(16, 185, 129, 0.15);
      --danger: #ef4444; --danger-alpha: rgba(239, 68, 68, 0.15);
      --warning: #f59e0b; --warning-alpha: rgba(245, 158, 11, 0.15);
      
      --input-bg: #0f172a; 
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
    }

    html.light-theme {
      --bg-base: #f1f5f9; 
      --bg-surface: #ffffff;
      --card-bg: #ffffff; 
      --card-bg-alpha: rgba(255, 255, 255, 0.9);
      --card-border: #e2e8f0;
      
      --primary: #4f46e5; 
      --primary-hover: #4338ca; 
      --primary-alpha: rgba(79, 70, 229, 0.1);
      
      --text-main: #0f172a; 
      --text-soft: #64748b; 
      
      --input-bg: #f8fafc; 
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }

    body { 
        font-family: 'Inter', sans-serif; 
        background: var(--bg-base); 
        color: var(--text-main); 
        font-size: 14px; 
        min-height: 100vh; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: 24px 16px; 
        transition: background-color 0.4s ease; 
        overflow-x: hidden; 
        -webkit-font-smoothing: antialiased;
    }
    
    .brand-title, .btn-action, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass-effect { background: var(--card-bg-alpha); backdrop-filter: blur(16px); border: 1px solid var(--card-border); }

    /* =========================================================
       2. TYPOGRAPHY & BUTTONS
       ========================================================= */
    .btn-secondary { background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-main); padding: 10px 16px; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
    .btn-secondary:hover { background: var(--input-bg); border-color: var(--primary); color: var(--primary); }

    .btn-action { width: 100%; padding: 16px; border-radius: var(--radius-md); border: none; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: var(--shadow-sm); }
    .btn-in { background: var(--success); }
    .btn-out { background: var(--danger); }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; filter: grayscale(50%); }
    .btn-action:not(:disabled):hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: var(--shadow-md); }

    /* =========================================================
       3. FORM INPUTS & UTILITIES
       ========================================================= */
    .input-field { width: 100%; padding: 14px 16px; border-radius: var(--radius-md); border: 1px solid var(--card-border); background: var(--input-bg); color: var(--text-main); margin-bottom: 16px; outline: none; font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif; transition: all 0.2s; box-shadow: inset 0 1px 2px rgba(0,0,0,0.02); }
    .input-field:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-alpha); background: var(--card-bg); }
    
    #global-loader { position: fixed; inset: 0; background: var(--bg-base); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: var(--text-soft); font-weight: 600; font-size: 15px; }
    .spinner { width: 44px; height: 44px; border: 4px solid var(--card-border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #toast { visibility: hidden; min-width: 300px; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px 24px; position: fixed; z-index: 10000; bottom: 40px; left: 50%; transform: translate(-50%, 20px); font-size: 14px; font-weight: 600; color: var(--text-main); background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); opacity: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    #toast.show { visibility: visible; opacity: 1; transform: translate(-50%, 0); }

    /* =========================================================
       4. LOGIN SCREEN
       ========================================================= */
    #login-screen { display: none; background: var(--card-bg); padding: 48px 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); text-align: center; width: 100%; max-width: 420px; margin-top: 10vh; border: 1px solid var(--card-border); }
    #login-screen h2 { font-weight: 800; font-size: 26px; margin-bottom: 12px; color: var(--text-main); }
    #login-screen p { color: var(--text-soft); margin-bottom: 32px; font-size: 14px; }
    
    #login-btn { width: 100%; padding: 14px; border-radius: var(--radius-md); border: none; background: var(--primary); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px; box-shadow: var(--shadow-sm); }
    #login-btn:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    
    #error-msg { color: var(--danger); font-size: 13px; font-weight: 600; margin-top: 16px; display: none; background: var(--danger-alpha); padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--danger-alpha); }
    
    .password-wrapper { position: relative; width: 100%; margin-bottom: 16px; }
    .password-wrapper .input-field { margin-bottom: 0; padding-right: 48px; }
    .toggle-password { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-soft); cursor: pointer; display: flex; transition: color 0.2s; }
    .toggle-password:hover { color: var(--text-main); }

    /* =========================================================
       5. DASHBOARD LAYOUT & COMPONENTS
       ========================================================= */
    #dashboard { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 540px; }
    
    .header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 24px; padding: 16px 24px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }
    .brand-area { display: flex; align-items: center; gap: 14px; }
    .brand-title { font-size: 18px; font-weight: 800; }
    .brand-tag { font-size: 11px; color: var(--text-soft); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px;}
    .header-controls { display: flex; gap: 12px; align-items: center; }
    #theme-toggle { background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-soft); cursor: pointer; padding: 10px; border-radius: var(--radius-md); transition: 0.2s; }
    #theme-toggle:hover { background: var(--input-bg); color: var(--text-main); }

    .main-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius-lg); padding: 24px; width: 100%; position: relative; overflow: visible; margin-bottom: 24px; box-shadow: var(--shadow-sm); }
    .card-border-top::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--primary), #3b82f6); border-top-left-radius: 20px; border-top-right-radius: 20px; }
    
    /* =========================================================
       6. CUSTOM SEARCHABLE DROPDOWN (Matched POS Logic)
       ========================================================= */
    .custom-dropdown { position: relative; width: 100%; margin-top: 8px; }
    .custom-dropdown-trigger { width: 100%; padding: 14px 16px; border-radius: var(--radius-md); border: 1px solid var(--card-border); background: var(--input-bg); color: var(--text-soft); font-size: 14px; font-weight: 500; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
    .custom-dropdown-trigger:hover { border-color: var(--primary); }
    .custom-dropdown-trigger.selected { color: var(--text-main); font-weight: 600; }
    .custom-dropdown-trigger.disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    
    .custom-dropdown-menu { position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius-md); box-shadow: var(--shadow-md); z-index: 100; display: none; flex-direction: column; overflow: hidden; }
    .custom-dropdown-menu.show { display: flex; }
    
    .custom-dropdown-search-wrapper { padding: 12px; border-bottom: 1px solid var(--card-border); background: var(--card-bg); }
    .custom-dropdown-search { width: 100%; padding: 12px 16px; border-radius: var(--radius-sm); border: 1px solid var(--card-border); background: var(--bg-base); color: var(--text-main); outline: none; font-size: 14px; font-weight: 500; }
    .custom-dropdown-search:focus { border-color: var(--primary); }
    
    .custom-dropdown-options { max-height: 220px; overflow-y: auto; padding: 8px 0; }
    .custom-option { padding: 10px 16px; cursor: pointer; color: var(--text-main); font-weight: 500; transition: background 0.2s; font-size: 13px; }
    .custom-option:hover { background: var(--input-bg); color: var(--primary); }
    .custom-option.disabled-option { color: var(--text-soft); cursor: default; text-align: center; }
    .custom-option.disabled-option:hover { background: transparent; color: var(--text-soft); }

    /* =========================================================
       7. HTML5-QRCode Container & Action Row
       ========================================================= */
    #video-wrapper { position: relative; background: #000; border-radius: var(--radius-md); overflow: hidden; width: 100%; height: 380px; margin-bottom: 24px; border: 1px solid var(--card-border); display: flex; align-items: center; justify-content: center; }
    #video-container { width: 100%; height: 100%; }
    #video-container video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
    #video-container.mirrored video { transform: scaleX(-1); }

    #flash-overlay { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; transition: opacity 0.1s; z-index: 20; }
    #flash-overlay.flash { opacity: 0.8; }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  </style>
</head>
<body>

  <div id="global-loader" class="glass-effect"><div class="spinner"></div><p>Connecting Secure Session...</p></div>
  <div id="toast"><div id="toast-icon"></div><div id="toast-msg"></div></div>

  <!-- Login Screen -->
  <div id="login-screen">
    <h2>Attendance Terminal</h2>
    <p>Sign in to unlock your branch scanner.</p>
    <input type="email" id="email-input" class="input-field" placeholder="branch@rjmobile.com" />
    <div class="password-wrapper">
      <input type="password" id="password-input" class="input-field" placeholder="Enter terminal password" />
      <button id="toggle-password-btn" class="toggle-password" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
    </div>
    <button id="login-btn">Secure Login</button>
    <div id="error-msg">Authentication failed.</div>
  </div>

  <!-- Main Terminal Application -->
  <div id="dashboard">
    <div class="header glass-effect">
      <div class="brand-area">
        <div>
          <div class="brand-title">Terminal POS</div>
          <div class="brand-tag" id="detected-branch-display">Identifying Location...</div>
        </div>
      </div>
      <div class="header-controls">
        <button id="theme-toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
        <button id="logout-btn" class="btn-secondary">Log Out</button>
      </div>
    </div>

    <!-- Active Cashier Select -->
    <div class="main-card card-border-top" style="padding: 20px 24px; margin-bottom: 24px;">
      <label style="font-size: 11px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.5px;">Active Employee</label>
      
      <div class="custom-dropdown" id="staff-dropdown">
        <div class="custom-dropdown-trigger disabled" id="staff-dropdown-trigger">
          <span id="staff-trigger-text">Connecting...</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        
        <div class="custom-dropdown-menu" id="staff-dropdown-menu">
          <div class="custom-dropdown-search-wrapper">
            <input type="text" id="staff-search" class="custom-dropdown-search" placeholder="🔍 Search employee name..." autocomplete="off" />
          </div>
          <div class="custom-dropdown-options" id="staff-options">
            <div class="custom-option disabled-option">Loading...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Scanner Feed Card -->
    <div class="main-card">
      
      <!-- EXACT POS SWITCH BUTTON -->
      <button id="switch-camera-btn" class="btn-secondary" style="width: 100%; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 9v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V9"/><path d="M9 22V12h6v10M2 10.6L12 2l10 8.6"/></svg>
        Switch Camera (Front/Back)
      </button>

      <div id="video-wrapper">
        <div id="video-container"></div>
        <div id="flash-overlay"></div>
      </div>

      <div class="btn-row">
        <button id="btn-clock-in" class="btn-action btn-in" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> 
          In + Photo
        </button>
        <button id="btn-clock-out" class="btn-action btn-out" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> 
          Out + Photo
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = 'https://rezumapzlsjnkitxvsul.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlenVtYXB6bHNqbmtpdHh2c3VsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNTY2NjUsImV4cCI6MjA5OTkzMjY2NX0.IVUZVjZUuiM9qTcKAIIxJth_zSIGJUWTaubUV4Fy0_Y';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { storageKey: 'rj_branch_terminal_auth' }
    });

    // POS Wala Camera Manager
    let html5Qrcode = null;
    let currentFacingMode = "user"; // Attendance me default Front Camera chalega
    let cameraActive = false;
    let isSwitchingCamera = false; // Camera switch ka flag

    let currentBranch = ""; 
    let isProcessing = false;
    let masterStaffNames = []; 
    let staffSelected = ""; 
    
    const flashOverlay = document.getElementById('flash-overlay');
    const btnIn = document.getElementById('btn-clock-in');
    const btnOut = document.getElementById('btn-clock-out');

    function displayToast(msg, statusType = "success") {
      const toast = document.getElementById('toast');
      const icon = document.getElementById('toast-icon');
      document.getElementById('toast-msg').innerText = msg;
      
      if (statusType === "success") icon.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5"><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
      else if (statusType === "error") icon.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
      else icon.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
      
      toast.className = "show";
      if (toast.timeout) clearTimeout(toast.timeout);
      toast.timeout = setTimeout(() => { toast.className = ""; }, 4000);
    }

    async function checkUser() {
        const { data: { session } } = await supabase.auth.getSession();
        handleAuthChange(session?.user);
    }
    supabase.auth.onAuthStateChange((event, session) => { handleAuthChange(session?.user); });

    async function handleAuthChange(user) {
        document.getElementById('global-loader').style.display = 'none';
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            
            const email = user.email.toLowerCase();
            const { data: branchData } = await supabase.from('branches_directory').select('branch_name').eq('email', email).single();
            
            if (branchData) { currentBranch = branchData.branch_name; }
            else if (email.includes('murlipura1')) currentBranch = "Murlipura, 1 Number";
            else if (email.includes('vki17')) currentBranch = "VKI, 17 Number";
            else if (email.includes('lohamandi')) currentBranch = "VKI, Lohamandi";
            else if (email.includes('shastri')) currentBranch = "Shastri Nagar";
            else if (email.includes('murlipura6')) currentBranch = "Murlipura, 6 Number";
            else currentBranch = "Central / Unassigned Branch";

            document.getElementById('detected-branch-display').innerHTML = currentBranch;
            displayToast("Branch Session Active.", "success");
            
            const { data: sData } = await supabase.from('staff_directory').select('name').order('name');
            if (sData) {
                masterStaffNames = sData.map(s => s.name);
                document.getElementById('staff-dropdown-trigger').classList.remove('disabled');
                document.getElementById('staff-trigger-text').innerText = "Tap to select your name...";
                renderStaffDropdown(masterStaffNames);
            }
            
            if (!cameraActive) {
                initScanner();
            }
        } else {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            currentBranch = "";
            btnIn.disabled = true;
            btnOut.disabled = true;
            
            stopScanner();
        }
    }
    checkUser();

    // --- POS WALA EXACT CAMERA ENGINE ---
    function initScanner() {
      if (!html5Qrcode) html5Qrcode = new Html5Qrcode("video-container");
      startCamera(currentFacingMode);
    }

    function startCamera(facingMode) {
      const container = document.getElementById('video-container');
      
      // Return promise & apply mirrored only after successful start
      return html5Qrcode.start(
          { facingMode: facingMode }, 
          { fps: 10 }, 
          () => {}, // Ignore Scans
          () => {}  // Ignore Scan Errors
      ).then(() => {
          cameraActive = true;
          if (facingMode === "user") container.classList.add("mirrored"); 
          else container.classList.remove("mirrored");
      }).catch((err) => {
          console.error(err);
          displayToast("Camera access denied or in use.", "error");
      });
    }

    function stopScanner() {
      if (html5Qrcode && html5Qrcode.isScanning) { 
          html5Qrcode.stop().then(() => { html5Qrcode.clear(); cameraActive = false; }).catch(err => console.error(err)); 
      }
    }

    // EXACT POS SWITCH BUTTON LOGIC (Fixed for double-taps and UI glitches)
    document.getElementById('switch-camera-btn').addEventListener('click', async () => {
      // Prevent multiple clicks while switching
      if (isSwitchingCamera) return; 
      isSwitchingCamera = true;
      
      const btn = document.getElementById('switch-camera-btn');
      const originalText = btn.innerHTML;
      
      // Show switching feedback
      btn.innerHTML = 'Switching...';
      btn.style.opacity = '0.6';
      btn.style.cursor = 'wait';

      currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
      
      try {
          if (html5Qrcode && html5Qrcode.isScanning) { 
              await html5Qrcode.stop(); 
          }
          await startCamera(currentFacingMode); 
      } catch (err) {
          console.error("Camera Switch Error:", err);
      } finally {
          // Re-enable button
          isSwitchingCamera = false;
          btn.innerHTML = originalText;
          btn.style.opacity = '1';
          btn.style.cursor = 'pointer';
      }
    });

    const dropdownTrigger = document.getElementById('staff-dropdown-trigger');
    const dropdownMenu = document.getElementById('staff-dropdown-menu');
    const searchInput = document.getElementById('staff-search');
    const triggerText = document.getElementById('staff-trigger-text');

    function renderStaffDropdown(list) {
        const optionsContainer = document.getElementById('staff-options');
        if (list.length === 0) {
            optionsContainer.innerHTML = `<div class="custom-option disabled-option">No results found</div>`;
            return;
        }
        optionsContainer.innerHTML = list.map(name => `<div class="custom-option" data-value="${name}">${name}</div>`).join('');
        
        document.querySelectorAll('.custom-option:not(.disabled-option)').forEach(opt => {
            opt.addEventListener('click', () => {
                staffSelected = opt.getAttribute('data-value');
                triggerText.innerText = staffSelected;
                dropdownTrigger.classList.add('selected');
                dropdownMenu.classList.remove('show');
                checkStaffStatus(staffSelected);
            });
        });
    }

    dropdownTrigger.addEventListener('click', () => {
        if (dropdownTrigger.classList.contains('disabled')) return;
        dropdownMenu.classList.toggle('show');
        if (dropdownMenu.classList.contains('show')) {
            searchInput.value = "";
            renderStaffDropdown(masterStaffNames);
            searchInput.focus(); 
        }
    });

    searchInput.addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase();
        const filteredList = masterStaffNames.filter(name => name.toLowerCase().includes(searchTerm));
        renderStaffDropdown(filteredList);
    });

    document.addEventListener('click', (e) => {
        const dropdown = document.getElementById('staff-dropdown');
        if (dropdown && !dropdown.contains(e.target)) {
            dropdownMenu.classList.remove('show');
        }
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
      const e = document.getElementById('email-input').value, p = document.getElementById('password-input').value, msg = document.getElementById('error-msg');
      msg.style.display = 'none'; 
      const { error } = await supabase.auth.signInWithPassword({ email: e, password: p });
      if(error) { msg.style.display = 'block'; msg.innerText = error.message; }
    });
    
    document.getElementById('logout-btn').addEventListener('click', async () => { await supabase.auth.signOut(); });
    document.getElementById('password-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('login-btn').click(); });
    document.getElementById('toggle-password-btn').addEventListener('click', () => {
      const passInput = document.getElementById('password-input');
      if (passInput.type === 'password') { passInput.type = 'text'; document.getElementById('toggle-password-btn').style.color = 'var(--primary)'; } else { passInput.type = 'password'; document.getElementById('toggle-password-btn').style.color = 'var(--text-soft)'; }
    });

    function triggerFlash() {
      flashOverlay.classList.add('flash');
      setTimeout(() => { flashOverlay.classList.remove('flash'); }, 150);
    }

    async function checkStaffStatus(staffName) {
        if (!staffName) return;

        btnIn.disabled = true;
        btnOut.disabled = true;
        displayToast(`Checking status for ${staffName}...`, "primary");

        try {
            const todayStart = new Date();
            todayStart.setHours(0,0,0,0);

            const { data, error } = await supabase
                .from('attendance_logs')
                .select('action')
                .eq('employee_name', staffName)
                .gte('timestamp', todayStart.toISOString())
                .order('timestamp', { ascending: false });

            if (error) throw error;

            let hasClockedIn = false;
            let hasClockedOut = false;

            if (data && data.length > 0) {
                hasClockedIn = data.some(log => log.action === 'Clock In');
                hasClockedOut = data.some(log => log.action === 'Clock Out');
            }

            if (hasClockedIn && hasClockedOut) {
                btnIn.disabled = true;
                btnOut.disabled = true;
                displayToast(`Shift Complete! You have already clocked in and out today.`, "success");
            } else if (hasClockedIn && !hasClockedOut) {
                btnIn.disabled = true;
                btnOut.disabled = false;
                displayToast(`Welcome back ${staffName.split(' ')[0]}! Ready to Clock Out?`, "success");
            } else {
                btnIn.disabled = false;
                btnOut.disabled = true;
                displayToast(`No records found today. Please Clock In.`, "primary");
            }
        } catch (err) {
            console.error("Error fetching status:", err);
            displayToast("Failed to verify status. Check internet.", "error");
        }
    }

    async function logAttendance(targetAction) {
      if (!staffSelected) {
        displayToast("Please select your name first!", "error");
        return;
      }
      
      if (isProcessing) return;
      isProcessing = true;
      
      triggerFlash();
      displayToast(`Uploading securely...`, "primary"); 
      
      const hiddenCanvas = document.createElement('canvas');
      hiddenCanvas.width = 480; 
      hiddenCanvas.height = 640; 
      const ctx = hiddenCanvas.getContext('2d');
      
      if (currentFacingMode === "user") {
          ctx.translate(hiddenCanvas.width, 0);
          ctx.scale(-1, 1);
      }
      
      let capturedBase64 = "";
      try {
        // html5-qrcode creates the <video> tag dynamically, grab it to draw the image!
        const dynamicVideo = document.querySelector('#video-container video');
        if(!dynamicVideo) throw new Error("Video feed not found");
        
        ctx.drawImage(dynamicVideo, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
        capturedBase64 = hiddenCanvas.toDataURL('image/jpeg', 0.6); 
      } catch (err) {
        console.error("Camera Capture Error", err);
      }

      try {
        const { error } = await supabase.from('attendance_logs').insert([{
          employee_name: staffSelected,
          branch: currentBranch, 
          action: targetAction,
          timestamp: new Date().toISOString(),
          photo_capture: capturedBase64
        }]);
        
        if (error) throw error;
        
        displayToast(`Success: ${targetAction} verified!`, "success");
        
        staffSelected = "";
        triggerText.innerText = "Tap to select your name...";
        dropdownTrigger.classList.remove('selected');
        
        btnIn.disabled = true;
        btnOut.disabled = true;
        
        setTimeout(() => { isProcessing = false; }, 2000); 
        
      } catch (err) {
        console.error(err);
        displayToast("Database transmission failed. Try again.", "error");
        isProcessing = false;
      }
    }

    document.getElementById('btn-clock-in').addEventListener('click', () => logAttendance('Clock In'));
    document.getElementById('btn-clock-out').addEventListener('click', () => logAttendance('Clock Out'));

    document.getElementById('theme-toggle').addEventListener('click', () => { 
        const isLight = document.documentElement.classList.toggle('light-theme'); 
        localStorage.setItem('rj_theme', isLight ? 'light' : 'dark'); 
    });
  </script>
</body>
</html>
